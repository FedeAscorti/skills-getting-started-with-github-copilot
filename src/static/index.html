<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
    <script>
      async function loadActivities() {
        const res = await fetch("/activities");
        const activities = await res.json();
        const activitiesList = document.getElementById("activities-list");
        activitiesList.innerHTML = ""; // Remove loading message

        Object.entries(activities).forEach(([name, info]) => {
          const card = document.createElement("div");
          card.className = "activity-card";
          card.innerHTML = `
            <h4>${name}</h4>
            <p><strong>Description:</strong> ${info.description}</p>
            <p><strong>Schedule:</strong> ${info.schedule}</p>
            <p><strong>Max Participants:</strong> ${info.max_participants}</p>
            <div class="participants-section">
              <strong>Participants:</strong>
              <ul class="participants-list">
                ${
                  Array.isArray(info.participants) && info.participants.length > 0
                    ? info.participants.map(email => `<li>${email}</li>`).join("")
                    : '<li class="no-participants">No participants yet.</li>'
                }
              </ul>
            </div>
          `;
          activitiesList.appendChild(card);
        });

        const activitySelect = document.getElementById("activity");
        activitySelect.innerHTML =
          '<option value="">-- Select an activity --</option>' +
          Object.keys(activities)
            .map(
              name =>
                `<option value="${name}">${name}</option>`
            )
            .join("");
      }

      // Run loadActivities only after DOM is ready
      document.addEventListener("DOMContentLoaded", () => {
        loadActivities();
      });

      // Add signup form handler to reload activities after signup
      document.getElementById("signup-form").addEventListener("submit", async function (e) {
        e.preventDefault();
        const email = document.getElementById("email").value;
        const activity = document.getElementById("activity").value;
        const messageDiv = document.getElementById("message");
        messageDiv.className = "hidden";
        messageDiv.textContent = "";

        try {
          const res = await fetch(`/activities/${encodeURIComponent(activity)}/signup?email=${encodeURIComponent(email)}`, {
            method: "POST"
          });
          if (!res.ok) {
            const data = await res.json();
            messageDiv.className = "message error";
            messageDiv.textContent = data.detail || "Error signing up.";
          } else {
            const data = await res.json();
            messageDiv.className = "message success";
            messageDiv.textContent = data.message;
            document.getElementById("signup-form").reset();
            await loadActivities(); // <-- reload activities to update participants
          }
        } catch (err) {
          messageDiv.className = "message error";
          messageDiv.textContent = "Network error.";
        }
        messageDiv.classList.remove("hidden");
      });
    </script>
  </body>
</html>
